name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: make format
      - run: git diff --exit-code
      - run: make lint
      - run: make test
      - run: make test-race
      - run: make test-e2e
      - run: make build
