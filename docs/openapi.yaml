openapi: 3.1.0
info:
  title: 0xbin API
  version: 0.1.0
  description: Plaintext and encrypted endpoints implemented through Implementation Plan Step 9.
paths:
  /api/v1/pastes:
    post:
      summary: Create a plaintext or encrypted paste
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePasteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePasteResponse'
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/v1/pastes/{slug}:
    get:
      summary: Retrieve an active paste
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: Active paste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasteResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/v1/pastes/{slug}/consume:
    post:
      summary: Reveal and atomically destroy an active burn-after-read paste
      description: For encrypted pastes, this consumes the ciphertext before the browser can verify a supplied key. A wrong or missing key cannot be retried after a successful consume.
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: The one successful reveal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasteResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/v1/pastes/{slug}/raw:
    get:
      summary: Retrieve active plaintext content as text
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: Plaintext content
          content:
            text/plain:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
components:
  parameters:
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string, pattern: '^[a-z]{1,128}$' }
  schemas:
    PlaintextPayload:
      type: object
      additionalProperties: false
      required: [version, content]
      properties:
        version: { type: integer, const: 1 }
        title: { type: string, description: At most 200 UTF-8 bytes. }
        language: { type: string, description: At most 64 UTF-8 bytes. }
        content: { type: string, minLength: 1, description: At most 1048576 UTF-8 bytes. }
    CreatePasteRequest:
      type: object
      additionalProperties: false
      required: [mode, payload, expiry]
      properties:
        mode: { type: string, enum: [plaintext, encrypted] }
        payload:
          oneOf:
            - $ref: '#/components/schemas/PlaintextPayload'
            - $ref: '#/components/schemas/CiphertextEnvelope'
        expiry: { type: string, enum: ['1h', '24h', '72h'] }
        burn_after_read: { type: boolean, default: false }
    CreatePasteResponse:
      type: object
      required: [slug, url, expires_at]
      properties:
        slug: { type: string }
        url: { type: string, format: uri }
        expires_at: { type: string, format: date-time }
    PasteResponse:
      type: object
      required: [slug, is_encrypted, burn_after_read, expires_at, created_at]
      properties:
        slug: { type: string }
        payload: { $ref: '#/components/schemas/PlaintextPayload' }
        envelope: { $ref: '#/components/schemas/CiphertextEnvelope' }
        is_encrypted: { type: boolean }
        crypto_version: { type: integer, const: 1 }
        burn_after_read: { type: boolean }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    CiphertextEnvelope:
      type: object
      additionalProperties: false
      required: [version, algorithm, iv, ciphertext]
      properties:
        version: { type: integer, const: 1 }
        algorithm: { type: string, const: A256GCM }
        iv: { type: string, description: Base64url-encoded 12-byte IV. }
        ciphertext: { type: string, description: Base64url-encoded AES-GCM ciphertext with authentication tag. }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
  responses:
    InvalidRequest:
      description: Invalid request
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    PayloadTooLarge:
      description: Paste exceeds the size limit
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Missing, expired, deleted, or consumed paste
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ServiceUnavailable:
      description: Temporary service failure
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Rate limit exceeded; response includes Retry-After
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
